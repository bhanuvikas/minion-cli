<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nefario — Minion Trace Viewer</title>
<style>
  :root {
    --bg: #111111;
    --sidebar-bg: #191919;
    --card-bg: #1e1e1e;
    --card-bg-hover: #242424;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #777;
    --accent: #FFD700;
    --accent-dim: #78450a;

    --c-session: #22c55e;
    --c-user: #3b82f6;
    --c-llm: #a78bfa;
    --c-tool: #f97316;
    --c-memory: #06b6d4;
    --c-reflection: #ec4899;
    --c-skip: #4b5563;
    --c-inject: #14b8a6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Summary bar ── */
  #summary-bar {
    background: #141414;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-shrink: 0;
  }
  #summary-bar .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-right: 8px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 13px; font-weight: 600; color: var(--text); }
  #refresh-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c-session);
    animation: pulse 2s infinite;
  }
  .dot.stopped { background: var(--c-skip); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Main layout ── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 210px;
    min-width: 210px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
  }
  .filter-row:hover { background: #242424; }
  .filter-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-label { flex: 1; font-size: 12px; color: var(--text); }
  .filter-count { font-size: 11px; color: var(--muted); }
  input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
  .filter-actions { display: flex; gap: 6px; margin-bottom: 8px; }
  .filter-actions button {
    flex: 1; font-size: 11px; padding: 3px 0;
    background: #2a2a2a; color: var(--muted);
    border: 1px solid #3a3a3a; border-radius: 4px;
    cursor: pointer;
  }
  .filter-actions button:hover { background: #333; color: var(--text); }

  #sidebar-stats .stat { margin-bottom: 10px; }

  /* ── Timeline ── */
  #timeline-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 40px;
  }
  #timeline { display: flex; flex-direction: column; gap: 8px; }

  /* ── Event card ── */
  .event-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.1s;
  }
  .event-card:hover { border-color: #3a3a3a; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: var(--card-bg-hover); }

  .card-type-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
  }
  .card-title { flex: 1; font-size: 12px; color: var(--text); }
  .card-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .card-time { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .card-chevron { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
  .card-chevron.open { transform: rotate(90deg); }

  .token-badge {
    background: rgba(167,139,250,0.15);
    color: #a78bfa;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .latency-badge {
    background: rgba(245,158,11,0.12);
    color: var(--accent);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
  }
  .success-badge { color: var(--c-session); font-size: 11px; }
  .error-badge { color: #ef4444; font-size: 11px; }

  .card-body {
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .card-body.visible { display: block; }

  pre {
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #ccc;
    font-size: 12px;
    line-height: 1.5;
    max-height: 600px;
    overflow-y: auto;
    resize: vertical;
  }
  .field-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: flex-start;
  }
  .field-key {
    color: var(--muted);
    font-size: 11px;
    min-width: 130px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .field-val { color: var(--text); font-size: 12px; word-break: break-word; }
  .pill {
    display: inline-block;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    margin: 1px 2px 1px 0;
    color: #ccc;
  }
  .memory-preview {
    background: #161616;
    border-left: 2px solid var(--c-memory);
    padding: 6px 10px;
    margin: 3px 0;
    border-radius: 0 4px 4px 0;
    font-size: 11px;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .ctrl-btn {
    background: #242424;
    border: 1px solid #3a3a3a;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .ctrl-btn:hover { background: #2e2e2e; color: var(--text); }

  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  #empty-state .big { font-size: 32px; margin-bottom: 12px; }

  /* Type-specific border colors */
  .type-session_start, .type-session_end { border-left-color: var(--c-session); }
  .type-user_turn { border-left-color: var(--c-user); }
  .type-llm_request, .type-llm_response { border-left-color: var(--c-llm); }
  .type-llm_response_minion   { border-left-color: #FFD700; }  /* Minion (end_turn) = yellow */
  .type-llm_response_thinking { border-left-color: #a78bfa; }  /* Thinking (tool_use) = purple */
  .type-tool_call, .type-tool_result { border-left-color: var(--c-tool); }
  .type-memory_retrieve, .type-memory_store { border-left-color: var(--c-memory); }
  .type-memory_skip { border-left-color: var(--c-skip); }
  .type-context_inject { border-left-color: var(--c-inject); }
  .type-reflection_start, .type-reflection_critique, .type-reflection_revision { border-left-color: var(--c-reflection); }
</style>
</head>
<body>

<!-- Summary bar -->
<div id="summary-bar">
  <span class="logo">🍌 nefario</span>
  <div class="stat">
    <span class="stat-label">Session</span>
    <span class="stat-value" id="stat-session">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Turns</span>
    <span class="stat-value" id="stat-turns">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Tokens in / out</span>
    <span class="stat-value" id="stat-tokens">0 / 0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Tool calls</span>
    <span class="stat-value" id="stat-tools">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Duration</span>
    <span class="stat-value" id="stat-duration">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Est. Cost</span>
    <span class="stat-value" id="stat-cost">—</span>
  </div>
  <div id="refresh-badge">
    <div class="dot" id="live-dot"></div>
    <span id="live-label">live</span>
  </div>
  <div style="margin-left:12px;display:flex;gap:6px">
    <button onclick="collapseAll()" class="ctrl-btn">Collapse all</button>
    <button onclick="expandAll()"   class="ctrl-btn">Expand all</button>
  </div>
</div>

<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar">
    <div>
      <div class="sidebar-section-title">Filter events</div>
      <div class="filter-actions">
        <button onclick="selectAllFilters()">Select all</button>
        <button onclick="clearAllFilters()">Clear</button>
      </div>
      <div id="filter-list"></div>
    </div>
    <div id="sidebar-stats">
      <div class="sidebar-section-title">Session stats</div>
      <div id="sidebar-stats-body"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div id="timeline-wrap">
    <div id="timeline"></div>
    <div id="empty-state" style="display:none">
      <div class="big">🍌</div>
      <div>No events yet — start a minion session</div>
    </div>
  </div>
</div>

<script>
// Pricing per million tokens: { in: $, out: $ }
const MODEL_COSTS = {
  'claude-opus-4':   { in: 15.00, out: 75.00 },
  'claude-sonnet-4': { in: 3.00,  out: 15.00 },
  'claude-haiku-4':  { in: 0.80,  out: 4.00  },
};

function calcCost(model, inTok, outTok) {
  if (!model || inTok == null || outTok == null) return null;
  const m = model.toLowerCase();
  for (const [key, pricing] of Object.entries(MODEL_COSTS)) {
    if (m.includes(key)) {
      return (inTok / 1_000_000) * pricing.in + (outTok / 1_000_000) * pricing.out;
    }
  }
  return null;
}

function fmtCost(cost) {
  if (cost == null) return null;
  if (cost < 0.00001) return '<$0.00001';
  return `$${cost.toFixed(5)}`;
}

const EVENT_COLORS = {
  session_start:        '#22c55e',
  session_end:          '#22c55e',
  user_turn:            '#3b82f6',
  llm_request:          '#a78bfa',
  llm_response:         '#a78bfa',
  llm_error:            '#ef4444',
  tool_call:            '#f97316',
  tool_result:          '#f97316',
  memory_retrieve:      '#06b6d4',
  memory_store:         '#06b6d4',
  memory_skip:          '#4b5563',
  context_inject:       '#14b8a6',
  reflection_start:     '#ec4899',
  reflection_critique:  '#ec4899',
  reflection_revision:  '#ec4899',
  plan_start:           '#eab308',
  plan_generated:       '#eab308',
  plan_refined:         '#eab308',
  plan_execute_start:   '#eab308',
  plan_complete:        '#eab308',
  skill_start:              '#10b981',
  skill_complete:           '#10b981',
  llm_response_thinking:    '#a78bfa',
  llm_response_minion:      '#FFD700',
  mcp_server_connect:       '#6366f1',
  mcp_tool_call:            '#6366f1',
  mcp_tool_result:          '#6366f1',
  mcp_resource_read:        '#818cf8',
  mcp_resource_result:      '#818cf8',
  mcp_prompt_get:           '#a78bfa',
  mcp_prompt_result:        '#a78bfa',
  mcp_error:                '#ef4444',
  mcp_log:                  '#94a3b8',
};

const EVENT_LABELS = {
  session_start:            'Session Start',
  session_end:              'Session End',
  user_turn:                'User',
  llm_request:              'LLM Request',
  llm_response:             'LLM Response',
  llm_error:                'LLM Error',
  llm_response_thinking:    'Thinking',
  llm_response_minion:      'Minion',
  tool_call:            'Tool Call',
  tool_result:          'Tool Result',
  memory_retrieve:      'Memory Retrieve',
  memory_store:         'Memory Store',
  memory_skip:          'Memory Skip',
  context_inject:       'Context Inject',
  reflection_start:     'Reflection Start',
  reflection_critique:  'Reflection Critique',
  reflection_revision:  'Reflection Revision',
  plan_start:           'Plan Start',
  plan_generated:       'Plan Generated',
  plan_refined:         'Plan Refined',
  plan_execute_start:   'Plan Execute',
  plan_complete:        'Plan Complete',
  skill_start:          'Skill Start',
  skill_complete:       'Skill Complete',
  mcp_server_connect:   'MCP Connect',
  mcp_tool_call:        'MCP Tool Call',
  mcp_tool_result:      'MCP Tool Result',
  mcp_resource_read:    'MCP Resource Read',
  mcp_resource_result:  'MCP Resource Result',
  mcp_prompt_get:       'MCP Prompt Get',
  mcp_prompt_result:    'MCP Prompt Result',
  mcp_error:            'MCP Error',
  mcp_log:              'MCP Log',
};

// Default expansion: LLM and tool cards start open
// llm_request and llm_response are collapsed by default — their headers now
// show enough context (narration / response snippet) to read the flow at a glance.
const DEFAULT_OPEN = new Set(['llm_error','tool_call','tool_result','user_turn','reflection_revision','plan_generated','plan_execute_start','skill_start','mcp_server_connect','mcp_tool_call','mcp_error','mcp_resource_read','mcp_prompt_get','mcp_prompt_result']);

let allEvents = [];
let filters = {};  // event_type -> bool (shown)
let sessionEnded = false;

function colorFor(t) { return EVENT_COLORS[t] || '#888'; }
function labelFor(t) { return EVENT_LABELS[t] || t; }

// mcp_log cards open by default only for warning+ severity levels
function isDefaultOpen(ev) {
  if (DEFAULT_OPEN.has(ev.event_type)) return true;
  if (ev.event_type === 'mcp_log') {
    return ['warning','error','critical','alert','emergency'].includes((ev.data||{}).level||'');
  }
  return false;
}

function fmtTime(ts) {
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', {
      hour12: false,
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      timeZone: 'America/Los_Angeles',
    });
  } catch { return ts; }
}

function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function sidebarStat(label, value) {
  return `<div class="stat" style="margin-bottom:10px">
    <span class="stat-label">${escHtml(label)}</span>
    <span class="stat-value" style="font-size:11px;word-break:break-all">${value}</span>
  </div>`;
}

function fieldRow(key, val) {
  return `<div class="field-row"><span class="field-key">${escHtml(key)}</span><span class="field-val">${val}</span></div>`;
}

function buildCardBody(ev) {
  const t = ev.event_type;
  const d = ev.data || {};
  const parts = [];

  if (t === 'session_start') {
    parts.push(fieldRow('model', `<span class="pill">${escHtml(d.model||'')}</span>`));
    parts.push(fieldRow('cwd', escHtml(d.cwd||'')));
    if (d.system_prompt) {
      parts.push(fieldRow('system prompt', `<pre>${escHtml(d.system_prompt)}</pre>`));
    }
  } else if (t === 'user_turn') {
    parts.push(`<pre>${escHtml(d.text||'')}</pre>`);
  } else if (t === 'llm_request') {
    parts.push(fieldRow('model', `<span class="pill">${escHtml(d.model||'')}</span>`));
    if (d.reflection_role) parts.push(fieldRow('role', `<span style="color:var(--c-reflection)">${escHtml(d.reflection_role)}</span>`));
    parts.push(fieldRow('messages', fmtNum(d.message_count)));
    parts.push(fieldRow('est. input tokens', fmtNum(d.estimated_input_tokens)));
    if (d.tool_names && d.tool_names.length) {
      const pills = d.tool_names.map(n => `<span class="pill">${escHtml(n)}</span>`).join('');
      parts.push(fieldRow('tools', pills));
    }
    if (d.system) {
      parts.push(fieldRow('system prompt', `<pre>${escHtml(d.system)}</pre>`));
    }
    if (d.messages && d.messages.length) {
      parts.push(fieldRow('conversation', `<pre>${escHtml(JSON.stringify(d.messages, null, 2))}</pre>`));
    }
    if (d.tools && d.tools.length) {
      parts.push(fieldRow('tools schema', `<pre>${escHtml(JSON.stringify(d.tools, null, 2))}</pre>`));
    }
  } else if (t === 'llm_response') {
    parts.push(fieldRow('model',         `<span class="pill">${escHtml(d.model||'')}</span>`));
    parts.push(fieldRow('stop reason',   `<span class="pill">${escHtml(d.stop_reason||'')}</span>`));
    parts.push(fieldRow('tokens in/out', `${fmtNum(d.input_tokens)} / ${fmtNum(d.output_tokens)}`));
    const cost = calcCost(d.model, d.input_tokens, d.output_tokens);
    if (cost != null) parts.push(fieldRow('est. cost', `<span style="color:#34d399">${fmtCost(cost)}</span>`));
    parts.push(fieldRow('latency',       `${fmtNum(d.latency_ms)} ms`));
    if (d.tool_calls && d.tool_calls.length) {
      const tcHtml = d.tool_calls.map(tc => {
        const inputSummary = Object.entries(tc.input||{})
          .map(([k,v]) => `${k}=${typeof v === 'string' ? v.slice(0,60) : JSON.stringify(v).slice(0,60)}`)
          .join(', ');
        return `<div style="margin:3px 0"><span class="pill" style="color:#f97316">${escHtml(tc.name)}</span> <span style="color:var(--muted);font-size:11px">${escHtml(inputSummary)}</span></div>`;
      }).join('');
      parts.push(fieldRow('tool calls', tcHtml));
    }
  } else if (t === 'llm_error') {
    parts.push(fieldRow('latency', `${fmtNum(d.latency_ms)} ms`));
    if (d.error) parts.push(fieldRow('error', `<pre style="color:#ef4444">${escHtml(d.error)}</pre>`));
  } else if (t === 'tool_call') {
    parts.push(fieldRow('tool', `<span class="pill">${escHtml(d.tool_name||'')}</span>`));
    if (d.inputs && Object.keys(d.inputs).length) {
      parts.push(fieldRow('inputs', `<pre>${escHtml(JSON.stringify(d.inputs, null, 2))}</pre>`));
    }
  } else if (t === 'tool_result') {
    parts.push(fieldRow('tool', `<span class="pill">${escHtml(d.tool_name||'')}</span>`));
    parts.push(fieldRow('status', d.success
      ? '<span class="success-badge">✓ success</span>'
      : '<span class="error-badge">✗ error</span>'));
    if (d.output) {
      parts.push(fieldRow('output', `<pre>${escHtml(d.output)}</pre>`));
    }
  } else if (t === 'memory_retrieve') {
    parts.push(fieldRow('query', escHtml(d.query||'')));
    parts.push(fieldRow('retrieved', fmtNum(d.num_retrieved)));
    if (d.memories && d.memories.length) {
      const previews = d.memories.map(m => `<div class="memory-preview">${escHtml(m)}</div>`).join('');
      parts.push(fieldRow('memories', previews));
    }
  } else if (t === 'memory_store') {
    parts.push(fieldRow('type', `<span class="pill">${escHtml(d.type||'')}</span>`));
    parts.push(fieldRow('category', `<span class="pill">${escHtml(d.category||'')}</span>`));
    parts.push(fieldRow('scope', `<span class="pill">${escHtml(d.scope||'')}</span>`));
    if (d.content) parts.push(fieldRow('content', `<pre>${escHtml(d.content)}</pre>`));
  } else if (t === 'memory_skip') {
    parts.push(fieldRow('reason', escHtml(d.reason||'')));
  } else if (t === 'context_inject') {
    parts.push(fieldRow('memories injected', fmtNum(d.memory_count)));
    parts.push(fieldRow('token estimate', fmtNum(d.token_estimate)));
    if (d.memories && d.memories.length) {
      const previews = d.memories.map(m => `<div class="memory-preview">${escHtml(m)}</div>`).join('');
      parts.push(fieldRow('memories', previews));
    }
  } else if (t === 'reflection_start') {
    parts.push(fieldRow('response length', fmtNum(d.initial_response_length)));
  } else if (t === 'reflection_critique') {
    parts.push(fieldRow('score', `<strong>${fmtNum(d.score)}/10</strong>`));
    if (d.critique) parts.push(fieldRow('critique', `<pre>${escHtml(d.critique)}</pre>`));
  } else if (t === 'reflection_revision') {
    parts.push(fieldRow('revised', d.was_revised
      ? '<span class="success-badge">yes</span>'
      : '<span class="muted">no</span>'));
    parts.push(fieldRow('final length', fmtNum(d.new_response_length)));
    if (d.was_revised && d.final_response) {
      parts.push(fieldRow('final response', `<pre>${escHtml(d.final_response)}</pre>`));
    }
    if (d.was_revised && d.original_response) {
      parts.push(fieldRow('original response', `<pre>${escHtml(d.original_response)}</pre>`));
    }
  } else if (t === 'session_end') {
    parts.push(fieldRow('turns', fmtNum(d.total_turns)));
    parts.push(fieldRow('tokens in', fmtNum(d.total_input_tokens)));
    parts.push(fieldRow('tokens out', fmtNum(d.total_output_tokens)));
    parts.push(fieldRow('tool calls', fmtNum(d.total_tool_calls)));
    parts.push(fieldRow('duration', `${d.duration_seconds}s`));
  } else if (t === 'plan_start') {
    if (d.goal) parts.push(fieldRow('goal', `<pre>${escHtml(d.goal)}</pre>`));
  } else if (t === 'plan_generated') {
    parts.push(fieldRow('path', escHtml(d.plan_path||'')));
    parts.push(fieldRow('length', `${fmtNum(d.plan_length_chars)} chars`));
    parts.push(fieldRow('generation time', `${fmtNum(d.generation_time_ms)} ms`));
  } else if (t === 'plan_refined') {
    parts.push(fieldRow('path', escHtml(d.plan_path||'')));
    parts.push(fieldRow('round', fmtNum(d.refinement_round)));
    if (d.feedback) parts.push(fieldRow('feedback', `<pre>${escHtml(d.feedback)}</pre>`));
  } else if (t === 'plan_execute_start') {
    parts.push(fieldRow('path', escHtml(d.plan_path||'')));
    parts.push(fieldRow('plan length', `${fmtNum(d.plan_length_chars)} chars`));
  } else if (t === 'plan_complete') {
    parts.push(fieldRow('path', escHtml(d.plan_path||'')));
  } else if (t === 'skill_start') {
    parts.push(fieldRow('skill', `<strong>/${escHtml(d.skill_name||'')}</strong>`));
    parts.push(fieldRow('source', escHtml(d.source||'')));
    if (d.arg) parts.push(fieldRow('target', `<pre>${escHtml(d.arg)}</pre>`));
  } else if (t === 'skill_complete') {
    parts.push(fieldRow('skill', `<strong>/${escHtml(d.skill_name||'')}</strong>`));
    if (d.arg) parts.push(fieldRow('target', escHtml(d.arg)));
  } else if (t === 'mcp_server_connect') {
    parts.push(fieldRow('server', `<strong>${escHtml(d.server_name||'')}</strong>`));
    parts.push(fieldRow('status', d.success
      ? '<span class="success-badge">✓ connected</span>'
      : '<span class="error-badge">✗ failed</span>'));
    parts.push(fieldRow('tools', fmtNum(d.tool_count)));
    parts.push(fieldRow('latency', `${fmtNum(d.latency_ms)}ms`));
    if (d.command) parts.push(fieldRow('command', `<pre>${escHtml(d.command.join(' '))}</pre>`));
    if (d.error) parts.push(fieldRow('error', `<pre style="color:#ef4444">${escHtml(d.error)}</pre>`));
  } else if (t === 'mcp_tool_call') {
    parts.push(fieldRow('tool', `<span class="pill" style="color:#6366f1">${escHtml(d.namespaced_name||'')}</span>`));
    if (d.inputs && Object.keys(d.inputs).length) {
      parts.push(fieldRow('inputs', `<pre>${escHtml(JSON.stringify(d.inputs, null, 2))}</pre>`));
    }
  } else if (t === 'mcp_tool_result') {
    parts.push(fieldRow('tool', `<span class="pill" style="color:#6366f1">${escHtml(d.server_name||'')}__${escHtml(d.tool_name||'')}</span>`));
    parts.push(fieldRow('status', d.success
      ? '<span class="success-badge">✓ success</span>'
      : '<span class="error-badge">✗ error</span>'));
    parts.push(fieldRow('latency', `${fmtNum(d.latency_ms)}ms`));
    if (d.output) parts.push(fieldRow('output', `<pre>${escHtml(d.output)}</pre>`));
  } else if (t === 'mcp_resource_read') {
    parts.push(fieldRow('server', `<span class="pill" style="color:#818cf8">${escHtml(d.server_name||'')}</span>`));
    parts.push(fieldRow('uri', `<code>${escHtml(d.uri||'')}</code>`));
  } else if (t === 'mcp_resource_result') {
    parts.push(fieldRow('server', `<span class="pill" style="color:#818cf8">${escHtml(d.server_name||'')}</span>`));
    parts.push(fieldRow('uri', `<code>${escHtml(d.uri||'')}</code>`));
    parts.push(fieldRow('status', d.success
      ? '<span class="success-badge">✓ success</span>'
      : '<span class="error-badge">✗ error</span>'));
    parts.push(fieldRow('latency', `${fmtNum(d.latency_ms)}ms`));
    parts.push(fieldRow('length', `${fmtNum(d.content_length)} chars`));
    if (d.content) parts.push(fieldRow('content', `<pre>${escHtml(d.content)}</pre>`));
  } else if (t === 'mcp_prompt_get') {
    parts.push(fieldRow('server', `<span class="pill" style="color:#a78bfa">${escHtml(d.server_name||'')}</span>`));
    parts.push(fieldRow('prompt', `<strong>${escHtml(d.prompt_name||'')}</strong>`));
    if (d.arguments && Object.keys(d.arguments).length) {
      parts.push(fieldRow('arguments', `<pre>${escHtml(JSON.stringify(d.arguments, null, 2))}</pre>`));
    }
  } else if (t === 'mcp_prompt_result') {
    parts.push(fieldRow('server', `<span class="pill" style="color:#a78bfa">${escHtml(d.server_name||'')}</span>`));
    parts.push(fieldRow('prompt', `<strong>${escHtml(d.prompt_name||'')}</strong>`));
    parts.push(fieldRow('status', d.success
      ? '<span class="success-badge">✓ success</span>'
      : '<span class="error-badge">✗ error</span>'));
    parts.push(fieldRow('messages', `${fmtNum(d.message_count)}`));
    parts.push(fieldRow('latency', `${fmtNum(d.latency_ms)}ms`));
    if (d.injected_text) parts.push(fieldRow('injected', `<pre>${escHtml(d.injected_text)}</pre>`));
  } else if (t === 'mcp_error') {
    if (d.server_name) parts.push(fieldRow('server', escHtml(d.server_name)));
    if (d.tool_name) parts.push(fieldRow('tool', escHtml(d.tool_name)));
    if (d.context) parts.push(fieldRow('context', `<span class="pill">${escHtml(d.context)}</span>`));
    if (d.error) parts.push(fieldRow('error', `<pre style="color:#ef4444">${escHtml(d.error)}</pre>`));
  } else if (t === 'mcp_log') {
    const lvl = d.level || 'info';
    const isWarn = ['warning','error','critical','alert','emergency'].includes(lvl);
    const lvlColor = isWarn ? (lvl === 'warning' ? '#f59e0b' : '#ef4444') : '#94a3b8';
    parts.push(fieldRow('server', escHtml(d.server_name||'')));
    parts.push(fieldRow('level', `<span style="color:${lvlColor};font-weight:600">${escHtml(lvl)}</span>`));
    if (d.logger) parts.push(fieldRow('logger', `<span style="color:var(--muted)">${escHtml(d.logger)}</span>`));
    if (d.data !== undefined) parts.push(fieldRow('message', `<pre>${escHtml(String(d.data))}</pre>`));
  } else {
    parts.push(`<pre>${escHtml(JSON.stringify(d, null, 2))}</pre>`);
  }

  return parts.join('');
}

function buildCardHeader(ev) {
  const t = ev.event_type;
  const d = ev.data || {};

  // color and badgeText can be overridden per event variant
  let color    = colorFor(t);
  let badgeText = labelFor(t);
  let title = '';
  let meta  = '';

  if (t === 'user_turn') {
    title = escHtml((d.text||'').slice(0, 80));

  } else if (t === 'llm_request') {
    const toolList = (d.tool_names||[]).slice(0,4).map(n => `<span class="pill">${escHtml(n)}</span>`).join('');
    const more = (d.tool_names||[]).length > 4 ? `<span class="pill">+${(d.tool_names||[]).length-4}</span>` : '';
    title = `${fmtNum(d.message_count)} msgs`;
    if (toolList) meta = toolList + more;
    if (d.reflection_role) meta += ` <span style="color:var(--c-reflection);font-size:11px;padding:1px 6px;background:rgba(236,72,153,0.1);border-radius:3px">${escHtml(d.reflection_role)}</span>`;

  } else if (t === 'llm_response') {
    const tokenBadge = `<span class="token-badge">↑ ${fmtNum(d.input_tokens)} / ↓ ${fmtNum(d.output_tokens)}</span>`;
    const latBadge   = `<span class="latency-badge">${fmtNum(d.latency_ms)}ms</span>`;
    const cost = calcCost(d.model, d.input_tokens, d.output_tokens);
    const costBadge = cost != null ? `<span style="background:rgba(52,211,153,0.12);color:#34d399;font-size:11px;padding:1px 7px;border-radius:3px">${fmtCost(cost)}</span>` : '';
    const stopPill = `<span style="background:rgba(255,255,255,0.07);border-radius:3px;padding:1px 6px;font-size:11px;color:#ccc">${escHtml(d.stop_reason||'')}</span>`;

    if (d.stop_reason === 'tool_use') {
      const tcNames = (d.tool_calls||[]).map(tc => `<span class="pill" style="color:#f97316">${escHtml(tc.name)}</span>`).join('');
      title = `${stopPill} ${tcNames}`;
    } else {
      title = stopPill;
    }
    meta = `${tokenBadge} ${latBadge} ${costBadge}`;
    if (d.reflection_role) meta += ` <span style="color:var(--c-reflection);font-size:11px;padding:1px 6px;background:rgba(236,72,153,0.1);border-radius:3px">${escHtml(d.reflection_role)}</span>`;

  } else if (t === 'llm_error') {
    title = escHtml((d.error||'').slice(0, 80));
    meta  = `<span class="error-badge">✗ error</span>`;

  } else if (t === 'tool_call') {
    title = escHtml(d.tool_name||'');
    // Show first input value as a hint (e.g. path='minion/runner.py')
    const firstArg = Object.entries(d.inputs||{}).find(([,v]) => typeof v === 'string');
    if (firstArg) title += ` <span style="color:var(--muted)">${escHtml(firstArg[0])}=<em>${escHtml(firstArg[1].slice(0,50))}</em></span>`;

  } else if (t === 'tool_result') {
    title = escHtml(d.tool_name||'');
    meta  = d.success ? '<span class="success-badge">✓</span>' : '<span class="error-badge">✗</span>';

  } else if (t === 'memory_retrieve') title = `${fmtNum(d.num_retrieved)} memories · ${escHtml((d.query||'').slice(0,40))}`;
  else if (t === 'memory_store')      title = `[${escHtml(d.category||'')}] ${escHtml((d.content||'').slice(0,60))}`;
  else if (t === 'memory_skip')       title = escHtml(d.reason||'');
  else if (t === 'context_inject')    title = `${fmtNum(d.memory_count)} memories · ~${fmtNum(d.token_estimate)} tokens`;
  else if (t === 'reflection_critique') title = `score ${d.score}/10`;
  else if (t === 'reflection_revision') title = d.was_revised ? 'revised' : 'accepted';
  else if (t === 'plan_start')          title = escHtml((d.goal||'').slice(0, 80));
  else if (t === 'plan_generated')    { title = escHtml((d.plan_path||'').split('/').pop()||''); meta = `<span class="latency-badge">${fmtNum(d.generation_time_ms)}ms</span>`; }
  else if (t === 'plan_refined')        title = `round ${d.refinement_round} · ${escHtml((d.feedback||'').slice(0,60))}`;
  else if (t === 'plan_execute_start')  title = escHtml((d.plan_path||'').split('/').pop()||'');
  else if (t === 'plan_complete')       title = escHtml((d.plan_path||'').split('/').pop()||'');
  else if (t === 'skill_start') {
    title = `/${escHtml(d.skill_name||'')}`;
    if (d.arg) title += ` · ${escHtml(d.arg.slice(0, 60))}`;
    meta = `<span style="color:#10b981;font-size:11px;padding:1px 6px;background:rgba(16,185,129,0.1);border-radius:3px">${escHtml(d.source||'builtin')}</span>`;
  } else if (t === 'skill_complete') {
    title = `/${escHtml(d.skill_name||'')}`;
    meta = `<span style="color:#10b981;font-size:11px;padding:1px 6px;background:rgba(16,185,129,0.1);border-radius:3px">✓ done</span>`;
  } else if (t === 'mcp_server_connect') {
    title = escHtml(d.server_name||'');
    meta = d.success
      ? `<span class="success-badge">✓ ${fmtNum(d.tool_count)} tools</span> <span class="latency-badge">${fmtNum(d.latency_ms)}ms</span>`
      : '<span class="error-badge">✗ failed</span>';
  } else if (t === 'mcp_tool_call') {
    title = escHtml(d.namespaced_name||'');
    const firstArg = Object.entries(d.inputs||{}).find(([,v]) => typeof v === 'string');
    if (firstArg) title += ` <span style="color:var(--muted)">${escHtml(firstArg[0])}=<em>${escHtml(firstArg[1].slice(0,50))}</em></span>`;
  } else if (t === 'mcp_tool_result') {
    title = `${escHtml(d.server_name||'')}__${escHtml(d.tool_name||'')}`;
    meta = d.success
      ? `<span class="success-badge">✓</span> <span class="latency-badge">${fmtNum(d.latency_ms)}ms</span>`
      : '<span class="error-badge">✗</span>';
  } else if (t === 'mcp_resource_read') {
    title = `<span style="color:#818cf8">${escHtml(d.server_name||'')}</span> · <code>${escHtml(d.uri||'')}</code>`;
  } else if (t === 'mcp_resource_result') {
    title = `<span style="color:#818cf8">${escHtml(d.server_name||'')}</span> · <code>${escHtml(d.uri||'')}</code>`;
    meta = d.success
      ? `<span class="success-badge">✓ ${fmtNum(d.content_length)}c</span> <span class="latency-badge">${fmtNum(d.latency_ms)}ms</span>`
      : '<span class="error-badge">✗</span>';
  } else if (t === 'mcp_prompt_get') {
    title = `<span style="color:#a78bfa">${escHtml(d.server_name||'')}</span> · <strong>${escHtml(d.prompt_name||'')}</strong>`;
    const argKeys = Object.keys(d.arguments || {});
    if (argKeys.length) meta = `<span style="color:var(--muted);font-size:11px">${argKeys.map(k=>`${escHtml(k)}=<em>${escHtml(String(d.arguments[k]).slice(0,30))}</em>`).join(' ')}</span>`;
  } else if (t === 'mcp_prompt_result') {
    title = `<span style="color:#a78bfa">${escHtml(d.server_name||'')}</span> · <strong>${escHtml(d.prompt_name||'')}</strong>`;
    meta = d.success
      ? `<span class="success-badge">✓ ${fmtNum(d.message_count)} msg</span> <span class="latency-badge">${fmtNum(d.latency_ms)}ms</span>`
      : '<span class="error-badge">✗ error</span>';
  } else if (t === 'mcp_error') {
    title = `${escHtml(d.server_name||'')} · ${escHtml((d.error||'').slice(0,60))}`;
    meta  = `<span class="error-badge">✗ ${escHtml(d.context||'error')}</span>`;
  } else if (t === 'mcp_log') {
    const lvl = d.level || 'info';
    const isWarn = ['warning','error','critical','alert','emergency'].includes(lvl);
    const isErr  = ['error','critical','alert','emergency'].includes(lvl);
    color = isErr ? '#ef4444' : isWarn ? '#f59e0b' : '#94a3b8';
    title = escHtml((d.data||'').slice(0, 80));
    const lvlBadge = isErr  ? `<span class="error-badge">${escHtml(lvl)}</span>`
                  : isWarn ? `<span style="background:rgba(245,158,11,0.15);color:#f59e0b;font-size:11px;padding:1px 6px;border-radius:3px">${escHtml(lvl)}</span>`
                           : `<span class="pill" style="color:#94a3b8">${escHtml(lvl)}</span>`;
    meta = lvlBadge;
    if (d.logger) meta += ` <span style="color:var(--muted);font-size:11px">${escHtml(d.logger)}</span>`;
  } else if (t === 'session_end') title = `${fmtNum(d.total_turns)} turns · ${d.duration_seconds}s`;

  const badge = `<span class="card-type-badge" style="color:${color}">${badgeText}</span>`;
  return `${badge}
    <span class="card-title">${title}</span>
    ${meta}
    <span class="card-time">${fmtTime(ev.timestamp)}</span>
    <span class="card-chevron ${isDefaultOpen(ev)?'open':''}">▶</span>`;
}

// Creates the companion "Minion" (end_turn) or "Thinking" (tool_use) text card
// that shows just the LLM's response/narration text, separate from the param card.
function createTextCard(ev, idx) {
  const d = ev.data || {};
  const isEndTurn = d.stop_reason === 'end_turn';
  const text = d.response || '';
  if (!text.trim()) return null;

  const vcType = isEndTurn ? 'llm_response_minion' : 'llm_response_thinking';
  const card = document.createElement('div');
  card.className = `event-card type-${vcType}`;
  card.dataset.type = vcType;
  card.dataset.idx = `${idx}-text`;

  const color = isEndTurn ? '#FFD700' : '#a78bfa';
  const badgeText = isEndTurn ? 'Minion' : 'Thinking';
  const snippet = text.replace(/\s+/g,' ').trim().slice(0, 100);
  const badge = `<span class="card-type-badge" style="color:${color}">${badgeText}</span>`;

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `${badge}
    <span class="card-title">${escHtml(snippet)}</span>
    <span class="card-time">${fmtTime(ev.timestamp)}</span>
    <span class="card-chevron open">▶</span>`;

  const body = document.createElement('div');
  body.className = 'card-body visible';
  body.innerHTML = `<pre style="border-left:2px solid ${color}">${escHtml(text)}</pre>`;

  header.addEventListener('click', () => {
    const open = body.classList.toggle('visible');
    header.querySelector('.card-chevron').classList.toggle('open', open);
  });

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function createCard(ev, idx) {
  const t = ev.event_type;
  const card = document.createElement('div');

  card.className = `event-card type-${t}`;
  card.dataset.type = t;
  card.dataset.idx = idx;

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = buildCardHeader(ev);

  const body = document.createElement('div');
  body.className = 'card-body' + (isDefaultOpen(ev) ? ' visible' : '');
  body.innerHTML = buildCardBody(ev);

  header.addEventListener('click', () => {
    const open = body.classList.toggle('visible');
    header.querySelector('.card-chevron').classList.toggle('open', open);
  });

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function updateSummary() {
  if (!allEvents.length) return;

  const sid = allEvents[0].session_id || '—';
  document.getElementById('stat-session').textContent = sid.slice(0,8) + '…';

  // Derive live counts from events
  const turns     = allEvents.filter(e => e.event_type === 'user_turn').length;
  const toolCalls = allEvents.filter(e => e.event_type === 'tool_call').length;
  const memStores = allEvents.filter(e => e.event_type === 'memory_store').length;
  const responses = allEvents.filter(e => e.event_type === 'llm_response');
  const tokIn  = responses.reduce((s,e) => s + (e.data.input_tokens||0), 0);
  const tokOut = responses.reduce((s,e) => s + (e.data.output_tokens||0), 0);
  const llmCalls  = responses.length;
  const totalCost = responses.reduce((s, e) => {
    const c = calcCost(e.data.model, e.data.input_tokens||0, e.data.output_tokens||0);
    return s + (c || 0);
  }, 0);

  // Try to get final stats from session_end
  const endEv = allEvents.find(e => e.event_type === 'session_end');
  if (endEv) {
    const d = endEv.data || {};
    document.getElementById('stat-turns').textContent    = fmtNum(d.total_turns);
    document.getElementById('stat-tokens').textContent   = `${fmtNum(d.total_input_tokens)} / ${fmtNum(d.total_output_tokens)}`;
    document.getElementById('stat-tools').textContent    = fmtNum(d.total_tool_calls);
    document.getElementById('stat-duration').textContent = `${d.duration_seconds}s`;
    sessionEnded = true;
    document.getElementById('live-dot').classList.add('stopped');
    document.getElementById('live-label').textContent = 'ended';
  } else {
    document.getElementById('stat-turns').textContent  = turns;
    document.getElementById('stat-tokens').textContent = `${fmtNum(tokIn)} / ${fmtNum(tokOut)}`;
    document.getElementById('stat-tools').textContent  = toolCalls;
  }
  const costDisplay = totalCost > 0 ? fmtCost(totalCost) : '—';
  document.getElementById('stat-cost').textContent = costDisplay;

  // ── Sidebar stats ─────────────────────────────────────────────────────────
  const startEv = allEvents.find(e => e.event_type === 'session_start');
  const sd = startEv ? startEv.data || {} : {};

  const parts = [];
  parts.push(sidebarStat('Session ID', `<span style="color:var(--muted);font-size:10px">${escHtml(sid)}</span>`));
  if (sd.model)  parts.push(sidebarStat('Model', `<span class="pill">${escHtml(sd.model)}</span>`));
  if (sd.cwd)    parts.push(sidebarStat('CWD', escHtml(sd.cwd)));
  if (startEv) {
    try {
      const d = new Date(startEv.timestamp);
      const started = d.toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false, timeZone: 'America/Los_Angeles',
      });
      parts.push(sidebarStat('Started', escHtml(started)));
    } catch { parts.push(sidebarStat('Started', escHtml(startEv.timestamp))); }
  }
  parts.push(sidebarStat('Turns',      fmtNum(turns)));
  parts.push(sidebarStat('LLM calls',  fmtNum(llmCalls)));
  parts.push(sidebarStat('Tool calls', fmtNum(toolCalls)));
  parts.push(sidebarStat('Tokens in',  fmtNum(tokIn)));
  parts.push(sidebarStat('Tokens out', fmtNum(tokOut)));
  if (totalCost > 0) parts.push(sidebarStat('Est. cost', `<span style="color:#34d399">${fmtCost(totalCost)}</span>`));
  parts.push(sidebarStat('Memories stored', fmtNum(memStores)));
  if (endEv) {
    const ed = endEv.data || {};
    parts.push(sidebarStat('Duration', `${ed.duration_seconds}s`));
  }

  document.getElementById('sidebar-stats-body').innerHTML = parts.join('');
}

function rebuildFilters() {
  const counts = {};
  for (const ev of allEvents) {
    counts[ev.event_type] = (counts[ev.event_type]||0) + 1;
    // Count virtual text cards (Thinking / Minion) derived from llm_response
    if (ev.event_type === 'llm_response' && (ev.data||{}).response) {
      const vcType = ev.data.stop_reason === 'end_turn' ? 'llm_response_minion' : 'llm_response_thinking';
      counts[vcType] = (counts[vcType]||0) + 1;
    }
  }

  const list = document.getElementById('filter-list');
  list.innerHTML = '';
  const types = Object.keys(counts).sort();

  for (const t of types) {
    if (!(t in filters)) filters[t] = true;
    const row = document.createElement('label');
    row.className = 'filter-row';
    row.innerHTML = `
      <input type="checkbox" ${filters[t]?'checked':''} data-type="${escHtml(t)}">
      <span class="filter-dot" style="background:${colorFor(t)}"></span>
      <span class="filter-label">${labelFor(t)}</span>
      <span class="filter-count">${counts[t]}</span>
    `;
    row.querySelector('input').addEventListener('change', (e) => {
      filters[t] = e.target.checked;
      applyFilters();
    });
    list.appendChild(row);
  }
}

function applyFilters() {
  const cards = document.querySelectorAll('.event-card');
  cards.forEach(card => {
    const t = card.dataset.type;
    card.style.display = (filters[t] !== false) ? '' : 'none';
  });
}

function selectAllFilters() {
  Object.keys(filters).forEach(t => filters[t] = true);
  rebuildFilters();
  applyFilters();
}

function clearAllFilters() {
  Object.keys(filters).forEach(t => filters[t] = false);
  rebuildFilters();
  applyFilters();
}

let prevCount = 0;

async function fetchEvents() {
  try {
    const resp = await fetch('/api/events');
    if (!resp.ok) return;
    const events = await resp.json();

    if (events.length === prevCount) return;

    const timeline = document.getElementById('timeline');
    const empty = document.getElementById('empty-state');

    if (events.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    // Append only new events
    for (let i = prevCount; i < events.length; i++) {
      allEvents.push(events[i]);
      timeline.appendChild(createCard(events[i], i));
      // llm_response gets a companion text card (Minion / Thinking)
      if (events[i].event_type === 'llm_response') {
        const tc = createTextCard(events[i], i);
        if (tc) timeline.appendChild(tc);
      }
    }
    prevCount = events.length;

    rebuildFilters();
    applyFilters();
    updateSummary();
  } catch (e) {
    // silently ignore fetch errors (server not yet ready / session ended)
  }
}

function collapseAll() {
  document.querySelectorAll('.card-body').forEach(b => b.classList.remove('visible'));
  document.querySelectorAll('.card-chevron').forEach(c => c.classList.remove('open'));
}

function expandAll() {
  document.querySelectorAll('.card-body').forEach(b => b.classList.add('visible'));
  document.querySelectorAll('.card-chevron').forEach(c => c.classList.add('open'));
}

// Initial load + auto-refresh every 2s
fetchEvents();
const refreshInterval = setInterval(() => {
  if (sessionEnded) {
    clearInterval(refreshInterval);
    return;
  }
  fetchEvents();
}, 2000);
</script>
